name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Derive version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            tag="$(git describe --tags --match 'v*' --abbrev=0)"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write VERSION
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Build install script
        run: bash build/build.sh

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev debhelper

      - name: Build deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Get deb version
        id: deb_version
        run: echo "version=$(dpkg-parsechangelog -S Version)" >> "$GITHUB_OUTPUT"

      - name: Upload install script
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: sui-control-install.sh
          asset_name: sui-control-install.sh
          tag: ${{ steps.version.outputs.tag }}
          overwrite: true

      - name: Upload deb package
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ../sui-control_${{ steps.deb_version.outputs.version }}_all.deb
          asset_name: sui-control_${{ steps.deb_version.outputs.version }}_all.deb
          tag: ${{ steps.version.outputs.tag }}
          overwrite: true
